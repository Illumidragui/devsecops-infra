crds:
  install: true

namespaceOverride: ${namespace}

server:
  service:
    annotations:
      # Expose ArgoCD UI through the Tailscale operator
      tailscale.com/expose: "true"
  extraArgs:
    - --insecure  # Dev only — remove for staging/prod and configure TLS

configs:
  secret:
    argocdServerAdminPassword: "${argocd_admin_password_hash}"

redis:
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"

controller:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"

repoServer:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
