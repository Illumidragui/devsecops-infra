name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm'
        required: true

jobs:
  deploy:
    name: Two-phase Terraform deploy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: us-east-1
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_tailscale_authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
      TF_VAR_tailscale_oauth_clientid: ${{ secrets.TAILSCALE_OAUTH_CLIENTID }}
      TF_VAR_tailscale_oauth_secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key

      # Join Tailnet before Phase 1 so we can verify the hostname slot is free
      # before the new EC2 boots and tries to register as lab-kubernetes.
      # OAuth credentials must have tag:ci in your ACL policy.
      - uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENTID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      # Ephemeral devices are removed from the Tailnet after they disconnect,
      # but cleanup can take 1-2 min. If we deploy before the old lab-kubernetes
      # device is gone, the new EC2 gets a suffixed hostname (lab-kubernetes-1,
      # -2, …) and the workflow resolves the stale dead IP instead of the new one.
      - name: Wait for lab-kubernetes hostname slot to be free
        run: |
          TS_HOSTNAME="lab-kubernetes"
          echo "Checking for stale '${TS_HOSTNAME}' device in Tailnet..."
          for i in $(seq 1 12); do
            if ! tailscale ip -4 "${TS_HOSTNAME}" 2>/dev/null | grep -q .; then
              echo "Hostname slot is free, proceeding"
              break
            fi
            [ $i -eq 12 ] && { echo "ERROR: stale device still present after 3 min. Delete it from Tailscale admin and retry."; exit 1; }
            echo "Attempt $i/12 — stale device still visible, waiting 15s for ephemeral cleanup..."
            sleep 15
          done

      - name: Terraform init
        run: terraform init

      - name: Phase 1 — VPC, EC2, EIP
        run: |
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=module.ec2 \
            -target=aws_eip.k3s \
            -target=aws_eip_association.k3s

      - name: Wait for k3s, then copy kubeconfig
        run: |
          TS_HOSTNAME="lab-kubernetes"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30 -i ~/.ssh/deploy_key"

          echo "Waiting for node to appear in Tailnet (up to 5 min)..."
          for i in $(seq 1 20); do
            TAILSCALE_IP=$(tailscale ip -4 "${TS_HOSTNAME}" 2>/dev/null) || true
            [ -n "${TAILSCALE_IP}" ] && { echo "Node visible at ${TAILSCALE_IP}"; break; }
            [ $i -eq 20 ] && { echo "Timed out waiting for node in Tailnet"; exit 1; }
            echo "Attempt $i/20 — retrying in 15s"
            sleep 15
          done

          echo "Verifying Tailscale data path (up to 3 min)..."
          for i in $(seq 1 12); do
            if tailscale ping -c 3 "${TAILSCALE_IP}" 2>/dev/null | grep -q "pong"; then
              echo "Tailscale data path confirmed"
              break
            fi
            [ $i -eq 12 ] && { echo "Tailscale data path not established"; tailscale status; exit 1; }
            echo "Attempt $i/12 — retrying in 15s"
            sleep 15
          done

          echo "Polling until k3s is ready (up to 10 min)..."
          for i in $(seq 1 40); do
            if ssh $SSH_OPTS ec2-user@${TAILSCALE_IP} "sudo kubectl get nodes --no-headers 2>/dev/null" | grep -q "Ready"; then
              echo "k3s ready after attempt $i"
              break
            fi
            [ $i -eq 40 ] && { echo "Timed out waiting for k3s"; exit 1; }
            echo "Attempt $i/40 — retrying in 15s"
            sleep 15
          done

          mkdir -p ~/.kube
          scp $SSH_OPTS ec2-user@${TAILSCALE_IP}:/etc/rancher/k3s/k3s.yaml ~/.kube/devsecops-config
          sed -i "s/127.0.0.1/${TAILSCALE_IP}/g" ~/.kube/devsecops-config
          echo "Kubeconfig written to ~/.kube/devsecops-config"

      - name: Phase 2 — ArgoCD
        env:
          TF_VAR_kubeconfig_path: /home/runner/.kube/devsecops-config
        run: terraform apply -auto-approve

      - name: Print public IP
        run: terraform output public_ip
